<svg width="1200" height="750" xmlns="http://www.w3.org/2000/svg">

  <!-- Styles -->
  <style>
    .title {
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: bold;
      fill: #2c3e50;
    }
    .label {
      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: bold;
      fill: #2c3e50;
    }
    .small {
      font-family: Arial, sans-serif;
      font-size: 16px;
      fill: #2c3e50;
    }
    .arrow {
      stroke: #2c3e50;
      stroke-width: 3;
      marker-end: url(#arrowhead);
    }
  </style>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="8"
            refX="12" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- PYTHON LOGO -->
  <g transform="translate(80,300)">
    <!-- Blue -->
    <rect x="0" y="0" width="120" height="60" rx="15" ry="15" fill="#306998"/>
    <circle cx="30" cy="20" r="6" fill="#FFD43B"/>
    <!-- Yellow -->
    <rect x="0" y="60" width="120" height="60" rx="15" ry="15" fill="#FFD43B"/>
    <circle cx="90" cy="90" r="6" fill="#306998"/>
    <text x="60" y="145" text-anchor="middle" class="label">Python Script</text>
  </g>

  <!-- ARROW Python -> CSV -->
  <line x1="200" y1="360" x2="330" y2="360" class="arrow"/>

  <!-- CSV ICON -->
  <g transform="translate(330,260)">
    <rect x="0" y="0" width="140" height="180" rx="10" ry="10" fill="#ffffff" stroke="#2c3e50" stroke-width="3"/>
    <rect x="0" y="120" width="140" height="60" fill="#217346"/>
    <text x="70" y="155" text-anchor="middle" font-family="Arial" font-size="28" fill="#ffffff" font-weight="bold">CSV</text>
    <text x="70" y="210" text-anchor="middle" class="label">.csv File</text>
  </g>

  <!-- ARROW CSV -> DB -->
  <line x1="470" y1="360" x2="620" y2="360" class="arrow"/>

  <!-- SQL SERVER CYLINDER -->
  <g transform="translate(620,200)">
    <ellipse cx="150" cy="0" rx="120" ry="35" fill="#e0ecff" stroke="#2c3e50" stroke-width="3"/>
    <rect x="30" y="0" width="240" height="150" fill="#e0ecff" stroke="#2c3e50" stroke-width="3"/>
    <ellipse cx="150" cy="150" rx="120" ry="35" fill="#e0ecff" stroke="#2c3e50" stroke-width="3"/>

    <text x="150" y="-45" text-anchor="middle" class="title">SQL Server Database</text>
  </g>

  <!-- SCHEMA STACK BELOW DB -->
  <g transform="translate(650,390)">
    <!-- stg -->
    <rect x="0" y="0" width="200" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#2c3e50" stroke-width="2"/>
    <text x="100" y="38" text-anchor="middle" class="label">stg Schema</text>

    <!-- arrow -->
    <line x1="100" y1="60" x2="100" y2="95" class="arrow"/>

    <!-- wh -->
    <rect x="0" y="95" width="200" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#2c3e50" stroke-width="2"/>
    <text x="100" y="133" text-anchor="middle" class="label">wh Schema</text>

    <!-- arrow -->
    <line x1="100" y1="155" x2="100" y2="190" class="arrow"/>

    <!-- views -->
    <rect x="0" y="190" width="200" height="60" rx="8" ry="8" fill="#f0f8ff" stroke="#2c3e50" stroke-width="2"/>
    <text x="100" y="228" text-anchor="middle" class="label">Views</text>
  </g>

  <!-- ARROW DB -> VIEW GROUP -->
  <line x1="770" y1="450" x2="950" y2="450" class="arrow"/>

  <!-- BUSINESS LOGIC VIEW GROUP -->
  <g transform="translate(950,150)">
    <rect x="0" y="0" width="230" height="420" rx="12" ry="12" fill="#fff8e7" stroke="#2c3e50" stroke-width="3"/>
    <text x="115" y="35" text-anchor="middle" class="title">Business Logic Views</text>

    <!-- View 1 -->
    <rect x="25" y="70" width="180" height="70" rx="8" ry="8" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="115" y="110" text-anchor="middle" class="small">vw.vw_SpecimenQuality</text>

    <!-- arrow -->
    <line x1="115" y1="140" x2="115" y2="170" class="arrow"/>

    <!-- View 2 -->
    <rect x="25" y="170" width="180" height="70" rx="8" ry="8" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="115" y="210" text-anchor="middle" class="small">vw.vw_TAT_And_AnalyzerPerformance</text>

    <!-- arrow -->
    <line x1="115" y1="240" x2="115" y2="270" class="arrow"/>

    <!-- View 3 -->
    <rect x="25" y="270" width="180" height="70" rx="8" ry="8" fill="#ffffff" stroke="#2c3e50" stroke-width="2"/>
    <text x="115" y="310" text-anchor="middle" class="small">vw.vw_ProviderOrderingPattern</text>
  </g>

</svg>
